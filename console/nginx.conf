resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Internal proxy — same-origin calls from the console
    # Prefix is _proxy/ to avoid PSaaS /api/* → Kong routing
    # Use variables to force runtime DNS resolution (not startup-cached)
    location /_proxy/management/ {
        set $mgmt_upstream management-api;
        rewrite ^/_proxy/management/(.*) /$1 break;
        proxy_pass http://$mgmt_upstream:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /_proxy/auth/ {
        set $auth_upstream auth-service;
        rewrite ^/_proxy/auth/(.*) /$1 break;
        proxy_pass http://$auth_upstream:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /_proxy/gateway/ {
        set $gtm_upstream mock-akamai-gtm;
        rewrite ^/_proxy/gateway/(.*) /$1 break;
        proxy_pass http://$gtm_upstream:8010;
        proxy_set_header Host $http_x_route_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header User-Agent $http_user_agent;
    }

    location /_proxy/jaeger/ {
        set $jaeger_upstream jaeger;
        rewrite ^/_proxy/jaeger/(.*) /$1 break;
        proxy_pass http://$jaeger_upstream:16686;
        proxy_set_header Host jaeger;
    }

    location /_proxy/watchdog/ {
        set $watchdog_upstream watchdog;
        rewrite ^/_proxy/watchdog/(.*) /$1 break;
        proxy_pass http://$watchdog_upstream:8006;
        proxy_set_header Host $host;
    }

    # Static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
