node:
  cluster: ingress-envoy
  id: envoy-gateway-1

dynamic_resources:
  lds_config:
    api_config_source:
      api_type: REST
      cluster_names: [xds_cluster]
      refresh_delay: 5s
      transport_api_version: V3
    resource_api_version: V3
  cds_config:
    api_config_source:
      api_type: REST
      cluster_names: [xds_cluster]
      refresh_delay: 5s
      transport_api_version: V3
    resource_api_version: V3

static_resources:
  clusters:
    - name: xds_cluster
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: xds_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ${XDS_HOST}
                      port_value: ${XDS_PORT}

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
