apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ingress-cp

resources:
  - ../../base/ingress-operator

patches:
  # Set imagePullPolicy: Never for kind (images loaded directly into nodes)
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
