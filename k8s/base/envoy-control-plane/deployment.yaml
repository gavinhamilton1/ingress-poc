apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-control-plane
  labels:
    app: envoy-control-plane
    ingress.jpmc.com/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy-control-plane
  template:
    metadata:
      labels:
        app: envoy-control-plane
        ingress.jpmc.com/component: control-plane
    spec:
      containers:
        - name: envoy-control-plane
          image: ingress-poc/envoy-control-plane:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: MANAGEMENT_API_URL
              value: http://management-api:8003
            - name: ENVOY_ADMIN_URL
              value: http://gateway-envoy:9901
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4318
          resources:
            limits:
              memory: 256Mi
              cpu: 250m
            requests:
              memory: 128Mi
              cpu: 100m
