apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-web
  labels:
    app: svc-web
    ingress.jpmc.com/component: data-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-web
  template:
    metadata:
      labels:
        app: svc-web
        ingress.jpmc.com/component: data-plane
    spec:
      containers:
        - name: svc-web
          image: ingress-poc/svc-web:latest
          ports:
            - containerPort: 8004
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: svc-web
            - name: PORT
              value: "8004"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4318
          resources:
            limits:
              memory: 256Mi
              cpu: 250m
            requests:
              memory: 128Mi
              cpu: 100m
