apiVersion: v1
kind: Service
metadata:
  name: gateway-envoy
  labels:
    app: gateway-envoy
    ingress.jpmc.com/component: data-plane
spec:
  selector:
    app: gateway-envoy
  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: admin
      port: 9901
      targetPort: 9901
      protocol: TCP
  type: ClusterIP
