apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-envoy
  labels:
    app: gateway-envoy
    ingress.jpmc.com/component: data-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-envoy
  template:
    metadata:
      labels:
        app: gateway-envoy
        ingress.jpmc.com/component: data-plane
    spec:
      containers:
        - name: gateway-envoy
          image: ingress-poc/gateway-envoy:latest
          ports:
            - name: proxy
              containerPort: 8000
              protocol: TCP
            - name: admin
              containerPort: 9901
              protocol: TCP
          env:
            - name: XDS_HOST
              value: envoy-control-plane
            - name: XDS_PORT
              value: "8080"
          resources:
            limits:
              memory: 256Mi
              cpu: 250m
            requests:
              memory: 128Mi
              cpu: 100m
