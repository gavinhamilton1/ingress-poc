apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns
  labels:
    app: dns
    ingress.jpmc.com/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dns
  template:
    metadata:
      labels:
        app: dns
        ingress.jpmc.com/component: control-plane
    spec:
      containers:
        - name: dns
          image: ingress-poc/dns:latest
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
          resources:
            limits:
              memory: 64Mi
              cpu: 100m
            requests:
              memory: 32Mi
              cpu: 50m
