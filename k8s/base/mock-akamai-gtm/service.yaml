apiVersion: v1
kind: Service
metadata:
  name: mock-akamai-gtm
  labels:
    app: mock-akamai-gtm
    ingress.jpmc.com/component: data-plane
spec:
  selector:
    app: mock-akamai-gtm
  ports:
    - name: http
      port: 8010
      targetPort: 8010
      protocol: TCP
    - name: https
      port: 8443
      targetPort: 8443
      protocol: TCP
  type: ClusterIP
