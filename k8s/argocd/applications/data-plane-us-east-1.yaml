# Argo CD Application for the US East 1 Data Plane Cluster
# Generated from data-plane-template.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-dp-us-east-1
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ingress-poc
    ingress.jpmc.com/cluster-type: data-plane
    ingress.jpmc.com/region: us-east-1
spec:
  project: default

  source:
    # CONFIGURE: Set to your GitOps repository URL
    repoURL: "PLACEHOLDER_REPO_URL"
    targetRevision: HEAD
    path: clusters/data-plane-us-east-1

  destination:
    # CONFIGURE: Set to the US East 1 DP cluster server URL registered with Argo CD
    # Run register-dp-cluster.sh first, then use the server URL from:
    #   kubectl get secret -n argocd -l argocd.argoproj.io/secret-type=cluster \
    #     -o jsonpath='{.items[0].data.server}' | base64 -d
    server: "PLACEHOLDER_DP_CLUSTER_SERVER_URL"
    namespace: ingress-dp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
